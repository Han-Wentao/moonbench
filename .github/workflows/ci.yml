name: CI

on:
  push:
  pull_request:

jobs:
  moonbit:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: pwsh
        run: |
          $env:MOON_HOME = "$env:USERPROFILE\.moon"
          Invoke-Expression (Invoke-WebRequest 'https://cli.moonbitlang.com/install/powershell.ps1' -UseBasicParsing).Content
          "$env:MOON_HOME\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Check
        run: moon check

      - name: Test
        run: moon test

      - name: Run demo
        run: moon run cmd/main

      - name: Run basic example
        run: moon run examples/basic
